apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: secrets
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: sealed-secrets
      version: 2.18.0
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
        namespace: flux-system
