apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-base
  namespace: istio-system
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: base
      version: "1.29.1"
      sourceRef:
        kind: OCIRepository
        name: istio-base
        namespace: flux-system
  values:
    revision: "1-29-1"
