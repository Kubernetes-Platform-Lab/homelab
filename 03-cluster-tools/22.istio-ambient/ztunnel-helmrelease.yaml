apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ztunnel
  namespace: istio-system
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: ztunnel
      version: ">=1.25.0-0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    revision: "1-25-0"
