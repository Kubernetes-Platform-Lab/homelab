apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
  annotations:
    external-dns.alpha.kubernetes.io/hostname: argocd.akna.one.pl
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-api
  hostnames:
    - argocd.akna.one.pl
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      #filters:
      #  - type: RequestHeaderModifier
      #    requestHeaderModifier:
      #      set:
      #        - name: X-Forwarded-Proto
      #          value: https
      #        - name: X-Forwarded-Host
      #          value: argocd.akna.one.pl
      #        - name: X-Forwarded-Port
      #          value: "443"
      backendRefs:
        - name: argocd-server
          port: 8080
