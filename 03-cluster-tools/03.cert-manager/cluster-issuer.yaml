apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: desec-issuer
spec:
  acme:
    solvers:
      - dns01:
          acmeDNS:
            host: auth.acme-dns.io
            apiTokenSecretRef:
              name: acme-dns
              namespace: cert-mamager
              key: acmedns.json
#https://cert-manager.io/docs/configuration/acme/dns01/acme-dns/
