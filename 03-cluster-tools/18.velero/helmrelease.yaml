apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: velero
      version: "7.1.2"
      sourceRef:
        kind: HelmRepository
        name: velero
        namespace: flux-system
  values:
    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v0.1.0
        imagePullPolicy: IfNotPresent
        volumeMounts:
          - mountPath: /target
            name: plugins
    configuration:
      backupStorageLocation:
        - name: default
          provider: aws
          bucket: velero-backups
          config:
            region: minio
            s3ForcePathStyle: "true"
            publicUrl: http://rustfs.rustfs.svc.cluster.local:9000
            s3Url: http://rustfs.rustfs.svc.cluster.local:9000
      volumeSnapshotLocation:
        - name: default
          provider: aws
          config:
            region: minio
    credentials:
      useSecret: false
    deployRestic: true
    restic:
      podVolumePath: /var/lib/kubelet/pods
