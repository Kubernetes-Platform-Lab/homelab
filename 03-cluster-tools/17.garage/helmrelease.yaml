apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
  namespace: garage
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: ./script/helm/garage
      sourceRef:
        kind: GitRepository
        name: garage
        namespace: flux-system
  values:
    deployment:
      replicaCount: 3
    replicationFactor: 2
    persistence:
      meta:
        storageClass: local-path
        size: 1Gi
      data:
        storageClass: local-path
        size: 10Gi
    garage:
      kubernetesSkipCrd: true
