apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: external-dns
spec:
  interval: 5m
  chart:
    spec:
      chart: external-dns
      version: ">=1.14.0"
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    createNamespace: true
  values:
    sources:
      - gateway-httproute
    provider:
      name: webhook
      webhook:
        service:
          port: 8080
        image:
          repository: ghcr.io/michelangelomo/external-dns-desec-provider
          tag: latest
        env:
          - name: WEBHOOK_APITOKEN
            valueFrom:
              secretKeyRef:
                name: desec-credentials
                key: api-token
          - name: WEBHOOK_DOMAINFILTERS
            value: "akna.one.pl"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
