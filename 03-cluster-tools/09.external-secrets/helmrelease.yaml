apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: external-secrets
      version: ">=1.15.0-0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
      bitwarden-sdk-server.enabled: true
