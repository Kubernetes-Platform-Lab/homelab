apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: kyverno
      version: "3.7.0"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
  values:
    admissionController:
      replicas: 1
    backgroundController:
      replicas: 1
    cleanupController:
      replicas: 1
    reportsController:
      replicas: 1
    crds:
      install: true
    config:
      excludeGroups:
        - system:serviceaccounts:kyverno
        - system:nodes
      mutateExistingOnPolicyUpdate: false
    securityContext:
      runAsNonRoot: true
      readOnlyRootFilesystem: true
    networkPolicy:
      enabled: true
    rbac:
      serviceAccount:
        create: true
        automount: true
    excludeKyvernoNamespace: true
    grafana:
      enabled: false
    prometheus:
      enabled: false
