apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-spiffe-csi
spec:
  background: true
  rules:
    - name: generate-helper-config
      match:
        any:
          - resources:
              kinds:
                - Namespace
              selector:
                matchLabels:
                  spiffe: "true"
      generate:
        apiVersion: v1
        kind: ConfigMap
        name: spiffe-helper-config
        synchronize: true
        generateExisting: true
        namespace: "{{ request.object.metadata.name }}"
        data:
          data:
            helper.conf: |
              agent_address = "/var/run/secrets/workload-spiffe-credentials/spire-agent.sock"
              cert_dir = "/var/run/secrets/spiffe-certs"
              svid_file_name = "svid.pem"
              svid_key_file_name = "svid_key.pem"
              svid_bundle_file_name = "bundle.pem"
              jwt_svids = [{jwt_audience = "merida.akna.lan", jwt_svid_file_name = "jwt_svid.token"}]
              jwt_bundle_file_name = "jwt_bundle.json"
    - name: add-spiffe-resources
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  spiffe: "true"
      mutate:
        patchStrategicMerge:
          spec:
            volumes:
              - name: spiffe-socket
                csi:
                  driver: csi.spiffe.io
                  readOnly: true
              - name: spiffe-certs
                emptyDir: {}
              - name: helper-config
                configMap:
                  name: spiffe-helper-config
            containers:
              - name: spiffe-helper
                image: ghcr.io/spiffe/spiffe-helper:0.11.0
                imagePullPolicy: IfNotPresent
                command:
                  - /spiffe-helper
                args:
                  - -config
                  - /etc/spiffe-helper/helper.conf
                volumeMounts:
                  - name: spiffe-socket
                    mountPath: /var/run/secrets/workload-spiffe-credentials
                    readOnly: true
                  - name: spiffe-certs
                    mountPath: /var/run/secrets/spiffe-certs
                  - name: helper-config
                    mountPath: /etc/spiffe-helper
                    readOnly: true
    - name: add-mounts
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaceSelector:
                matchLabels:
                  spiffe: "true"
      mutate:
        foreach:
          - list: "request.object.spec.containers[?name != 'spiffe-helper']"
            patchStrategicMerge:
              spec:
                containers:
                  - name: "{{ element.name }}"
                    volumeMounts:
                      - name: spiffe-socket
                        mountPath: /var/run/secrets/workload-spiffe-credentials
                        readOnly: true
                      - name: spiffe-certs
                        mountPath: /var/run/secrets/spiffe-certs
                        readOnly: true
