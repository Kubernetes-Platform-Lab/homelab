apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
spec:
  interval: 5m

  install:
    createNamespace: true

  chart:
    spec:
      chart: openbao
      version: "0.26.2"
      sourceRef:
        kind: HelmRepository
        name: openbao
        namespace: flux-system

  values:
    global:
      enabled: true
      tlsDisable: true

    server:
      auditStorage:
        enabled: false
      ha:
        enabled: true
        raft:
          enabled: true
      dataStorage:
        enabled: true
        size: 5Gi

    ui:
      enabled: true
