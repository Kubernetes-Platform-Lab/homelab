apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cloudflare-tunnel
  namespace: cloudflare
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: cloudflare-tunnel
      version: "0.3.2"
      sourceRef:
        kind: HelmRepository
        name: cloudflare
        namespace: flux-system

  values:
    cloudflare:
      #account: ""  # Your Cloudflare account tag
      tunnelName: "akna-tunel"  # Tunnel name
      #tunnelId: ""  # Tunnel UUID
      # secret: ""  # Tunnel secret (base64-encoded)
      # Alternatively, use secretName to reference an existing secret
      secretName: cloudflare-tunnel-token
      ingress: 
        - hostname: chat.orasuno.pl
          service: http://mattermost.mattermost.svc:8065


    replicaCount: 2

    image:
      repository: cloudflare/cloudflared
      tag: "2026.1.1"
      pullPolicy: IfNotPresent

    serviceAccount:
      annotations: {}
      name: ""

    podAnnotations: {}
    podLabels:
      app: cloudflared

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: ["ALL"]
      readOnlyRootFilesystem: true

    resources:
      requests:
        cpu: 100m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app: cloudflared
          topologyKey: kubernetes.io/hostname

    nodeSelector: {}
    tolerations: []
