apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: secrets-store-csi-driver
  namespace: kube-system
spec:
  interval: 5m

  install:
    createNamespace: false

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: secrets-store-csi-driver
      version: "1.4.4"
      sourceRef:
        kind: HelmRepository
        name: secrets-store-csi-driver
        namespace: flux-system
  values:
    secretsStoreDriver:
      enabled: true
    nodePlugin:
      priorityClassName: system-node-critical
    driver:
      enableSecretRotation: true
      rotationPollInterval: 3600s
    provider:
      enabled: true
    enableCSPowerShell: false
    enableLinux: true
    enableWindows: false
    livenessProbe:
      enabled: true
    readinessProbe:
      enabled: true
