apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: kagent
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: kagent-crds
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: kagent
spec:
  interval: 5m

  dependsOn:
    - name: kagent-crds

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: kagent
      sourceRef:
        kind: HelmRepository
        name: kagent
        namespace: flux-system

  values:
    providers:
      default: anthropic
      anthropic:
        provider: Anthropic
        model: "nvidia/nemotron-3-ultra-550b-a55b:free"
        apiKeySecretRef: kagent-anthropic
        apiKeySecretKey: ANTHROPIC-API-KEY
         
