apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi
  namespace: democratic-csi
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: democratic-csi
      version: 0.15.1
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
  values:
    driver:
      existingConfigSecret: driver-config-file
      image:
        registry: ghcr.io/democratic-csi/democratic-csi
        tag: latest
    csiDriver:
      name: "org.democratic-csi.iscsi"
    node:
      driver:
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          tag: latest