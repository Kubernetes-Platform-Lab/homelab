apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: democratic-csi
  namespace: democratic-csi
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: democratic-csi
      version: 0.15.1
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
  values:
    driver:
      existingConfigSecret: zfs-connection-ssh-key
      image:
        registry: ghcr.io/democratic-csi/democratic-csi
        tag: latest
      config:
        driver: zfs-generic-iscsi
        sshConnection:
          host: 10.20.0.11
          port: 22
          username: root
        zfs:
          datasetParentName: truenas-pool-1/z1
          detachedSnapshotsDatasetParentName: truenas-pool-1/s1
          # Optional: compression for zvols
          #zvolCompression: "lz4"
        iscsi:
          shareStrategy: "targetCli"
          shareStrategyTargetCli:
            basename: "iqn.2026-01.com.nas.proxmox:k8s"
            tpg:
              attributes:
                authentication: 0
                generate_node_acls: 1
                demo_mode_write_protect: 0
          targetPortal: "10.20.0.11:3260"
    csiDriver:
      name: "org.democratic-csi.iscsi"
    node:
      driver:
        image:
          registry: ghcr.io/democratic-csi/democratic-csi
          tag: latest