apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kuma
  namespace: kuma-system
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: kuma
      version: "2.13.0"
      sourceRef:
        kind: HelmRepository
        name: kuma
        namespace: flux-system
  values:
    cni:
      enabled: false
    controlPlane:
      mode: zone
      zoneIngress:
        enabled: true
      zoneEgress:
        enabled: true
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 64Mi
    defaults:
      meshIngress:
        enabled: true
      meshEgress:
        enabled: true
    gui:
      enabled: true
    ingress:
      enabled: false
    egress:
      enabled: false
    certManager:
      enabled: false
