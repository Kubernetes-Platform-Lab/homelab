apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kiali-operator
  namespace: kiali-operator
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: kiali-operator
      version: "2.24.0"
      sourceRef:
        kind: HelmRepository
        name: kiali
        namespace: flux-system

  values:
    cr:
      create: true
      namespace: istio-system
      spec:
        auth:
          strategy: "anonymous"
        deployment:
          instance_name: kiali
        external_services:
          istio:
            istio_api_enabled: true
          prometheus:
            url: "http://prometheus:9090"
          healthz:
            url: "http://kiali:6789"
        server:
          web_root: "/kiali"