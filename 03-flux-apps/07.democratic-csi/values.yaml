csiDriver:
  name: "org.democratic-csi.nfs"

storageClasses:
  - name: freenas-nfs-csi
    defaultClass: false
    reclaimPolicy: Retain
    volumeBindingMode: Immediate
    allowVolumeExpansion: true
    parameters:
      fsType: nfs

    mountOptions:
      - noatime
      - nfsvers=4
    secrets:
      provisioner-secret:
      controller-publish-secret:
      node-stage-secret:
      node-publish-secret:
      controller-expand-secret:

driver:
  config:
    driver: zfs-generic-iscsi
    instance_id:
    httpConnection:
      protocol: http
      host: CHANGEME
      port: 80
      apiKey: CHANGEME
      username: root
      allowInsecure: true
      apiVersion: 2
    sshConnection:
      host: CHANGEME
      port: 22
      username: root
      privateKey: CHANGEME
    zfs:
      datasetParentName: CHANGEME
      detachedSnapshotsDatasetParentName: CHANGEME
      datasetEnableQuotas: true
      datasetEnableReservation: false
      datasetPermissionsMode: "0777"
      datasetPermissionsUser: root
      datasetPermissionsGroup: wheel
    nfs:
      shareHost: CHANGEME
      shareAlldirs: false
      shareAllowedHosts: []
      shareAllowedNetworks: []
      shareMaprootUser: root
      shareMaprootGroup: wheel
      shareMapallUser: ""
      shareMapallGroup: ""
