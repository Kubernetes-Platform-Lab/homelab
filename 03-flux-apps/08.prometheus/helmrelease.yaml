apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: prometheus
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=61.0.0-0"
      sourceRef:
        kind: HelmRepository
        name: prometheus
        namespace: flux-system
  values:
    prometheus:
      prometheusSpec:
        retention: 5d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: openebs-lvm
              resources:
                requests:
                  storage: 8Gi
    alertmanager:
      alertmanagerSpec:
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: openebs-lvm
              resources:
                requests:
                  storage: 6Gi
    grafana:
      persistence:
        enabled: true
        storageClassName: openebs-lvm
        size: 6Gi
      grafana.ini:
        server:
          root_url: https://grafana.akna.one.pl
