    networkInterfaces:
      - deviceSelector:
          hardwareAddr: 06:54:00:12:34:30
        addresses:
          - 10.30.0.31/16
        mtu: 1500
        routes:
          - network: 0.0.0.0/0
            gateway: 10.30.0.1
        vip:
          ip: 10.30.0.200
      - deviceSelector:
          hardwareAddr: 06:54:00:12:34:40
        addresses:
          - 10.40.0.31/16
        mtu: 1500
