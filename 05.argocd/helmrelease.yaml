apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argocd
  namespace: argocd
spec:
  interval: 5m

  install:
    createNamespace: true

  upgrade:
    remediation:
      retries: 3

  chart:
    spec:
      chart: argo-cd
      version: "5.38.1" # latest stable as of Jan 2026
      sourceRef:
        kind: HelmRepository
        name: argo
        namespace: flux-system
      valuesFiles:
        - values.yaml
