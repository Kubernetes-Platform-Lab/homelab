ipam:
  mode: kubernetes

gatewayAPI:
  enabled: true

envoy:
  enabled: true

kubeProxyReplacement: true

bgpControlPlane:
  enabled: true

k8sServiceHost: localhost
k8sServicePort: 7445

bgp:
  enabled: true

bpf:
  masquerade: true

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE
