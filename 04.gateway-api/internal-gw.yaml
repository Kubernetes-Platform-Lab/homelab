apiVersion: gateway.networking.k8s.io/v1beta1
kind: Gateway
metadata:
  name: internal-gateway
  namespace: gateway-api
spec:
  addresses:
    - type: IPAddress
      value: 10.40.0.180
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTPS
      port: 443
      allowedRoutes:
        namespaces:
          from: All
