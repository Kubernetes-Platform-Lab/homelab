apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnativepg-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.com/homelab-dev/2-Apps.git
    targetRevision: HEAD
    path: apps/cloudnativepg/cluster
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
