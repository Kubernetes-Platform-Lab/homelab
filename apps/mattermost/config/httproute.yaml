---
# Kubernetes Gateway API Configuration for Mattermost
# This uses the Gateway API standard instead of Ingress

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: mattermost
  namespace: mattermost
  annotations: 
    external-dns.alpha.kubernetes.io/hostname: mattermost.akna.one.pl
spec:
  parentRefs:
    - name: internal-gateway
      namespace: gateway-api
  hostnames:
    - mattermost.akna.one.pl
  rules:
    - backendRefs:
        - name: mattermost
          port: 8065
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
