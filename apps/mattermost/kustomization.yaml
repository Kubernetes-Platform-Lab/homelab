apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources for Mattermost Operator deployment
resources:
  # Operator itself (installs in mattermost-operator namespace)
  - mattermost-operator-app.yaml

  # Mattermost installation and configuration (installs in mattermost namespace)
  - mattermost-installation.yaml
  - mattermost-db-secret.yaml
  - ../config/service.yaml
  - ../config/database.yaml
  - ../config/resources.yaml
  - ../config/features.yaml

  # Gateway API routing
  - ../config/httproute.yaml

