apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mattermost-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: https://github.com/mattermost/mattermost-operator.git
    targetRevision: master
    path: config/crd/bases

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true