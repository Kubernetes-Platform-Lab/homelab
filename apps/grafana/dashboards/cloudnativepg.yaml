          "gridPos": {"h": 7, "w": 3, "x": 0, "y": 0},
          "id": 676,
          "options": {
            "alertInstanceLabelFilter": "{namespace=~\"$namespace\",pod=~\"$instances\"}",
            "alertName": "",
            "dashboardAlerts": false,
            "folder": "",
            "groupBy": [],
            "groupMode": "default",
            "maxItems": 20,
            "sortOrder": 1,
            "stateFilter": {"error": true, "firing": true, "noData": false, "normal": true, "pending": true},
            "viewMode": "list"
