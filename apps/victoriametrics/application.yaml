apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoriametrics
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: victoria-metrics-k8s-stack
    repoURL: https://victoriametrics.github.io/helm-charts
    targetRevision: 0.42.0
    helm:
      releaseName: vm-stack
      valuesObject:
        fullnameOverride: vm # short names to reduce annotation size
        nodeExporter:
          full: false
        vmagent:
          enabled: false
        vmoperator:
          enabled: true
          crds:
            enabled: true
        vmsingle:
          enabled: true
        grafana:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
