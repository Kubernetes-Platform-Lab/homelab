apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoriametrics-scrape-crd
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://gitlab.com/your-group/2-Apps.git
    targetRevision: HEAD
    path: apps/victoriametrics/scrape-crd
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: victoriametrics
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
