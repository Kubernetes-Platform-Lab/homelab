apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ente
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://l4gdev.github.io/helm-charts
    chart: ente-photos
    targetRevision: 0.2.0
    helm:
      releaseName: ente
      valuesObject:
        web:
          photos:
            env:
              - NEXT_PUBLIC_ENTE_ENDPOINT: "https://api-ente.akna.one.pl"
          auth:
            env:
              - NEXT_PUBLIC_ENTE_ENDPOINT: "https://api-ente.akna.one.pl"
          accounts:
            env:
              - NEXT_PUBLIC_ENTE_ENDPOINT: "https://api-ente.akna.one.pl"
          albums:
            env:
              - NEXT_PUBLIC_ENTE_ENDPOINT: "https://api-ente.akna.one.pl"
        networkPolicy:
           enabled: false        
        credentials:
          existingSecret: "ente-credentials"
        externalDatabase:
          host: "ente-postgres-rw.ente.svc.cluster.local"
          port: 5432
          database: "ente_db"
          user: "ente"
          existingSecret:
            enabled: true
            secretName: "ente-postgres-app"
            passwordKey: "password"
  destination:
    server: https://kubernetes.default.svc
    namespace: ente
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    #automated:
    #  prune: true
    #  selfHeal: true
