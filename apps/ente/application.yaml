apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ente
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://l4gdev.github.io/helm-charts
    chart: ente-photos
    targetRevision: 0.2.0
    helm:
      releaseName: ente
      valuesObject:
        networkPolicy:
           enabled: false        
        museum:
          config:
            extraConfig: |
              s3:
                are_local_buckets: true
                use_path_style_urls: true
                b2-eu-cen:
                  key: "REMOVED_S3_KEY"
                  secret: "REMOVED_S3_SECRET"
                  endpoint: "http://10.10.0.77:8333"
                  region: "us-east-1"
                  bucket: "ente"
            jobs:
              cron:
                skip: true
        credentials:
          #existingSecret: "ente-credentials"
          s3:
            primary:
              endpoint: ""
              region: ""
              bucket: ""
              key: ""
              secret: ""
        externalDatabase:
          host: "ente-postgres-rw.ente.svc.cluster.local"
          port: 5432
          database: "ente_db"
          user: "ente"
          existingSecret:
            enabled: true
            secretName: "ente-postgres-app"
            passwordKey: "password"
  destination:
    server: https://kubernetes.default.svc
    namespace: ente
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    #automated:
    #  prune: true
    #  selfHeal: true
